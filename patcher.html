<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeasurePDF iOS Patcher v5</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: #0f0f0f; color: #f0ede8; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.card {
  width: 100%; max-width: 380px; background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 20px; padding: 28px 24px; display: flex; flex-direction: column; gap: 20px;
}
.logo { width:44px;height:44px;background:#ff0000;border-radius:12px;display:flex;align-items:center;justify-content:center; }
h1 { font-size:18px; font-weight:600; }
h1 span { color:#ff0000; }
p.sub { font-size:13px; color:#666; line-height:1.6; }
.pick-wrap { position:relative; width:100%; height:52px; }
.pick-face {
  position:absolute;inset:0;background:#ff0000;color:#fff;border:none;border-radius:14px;
  font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;
  pointer-events:none;
}
.pick-wrap:active .pick-face { background:#cc0000; }
#file-input { position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:16px; }
.log {
  background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:14px;
  font-family:'SF Mono',Menlo,monospace;font-size:12px;line-height:1.8;color:#888;
  display:none;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;
}
.log.show { display:block; }
.ok  { color:#27ae60; }
.err { color:#e74c3c; }
.warn{ color:#f39c12; }
.info{ color:#3498db; }
#dl-btn {
  display:none;width:100%;height:52px;background:#27ae60;color:#fff;border:none;
  border-radius:14px;font-size:16px;font-weight:600;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
#dl-btn.show { display:flex; }
#dl-btn:active { background:#219a52; }
.steps { background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:14px;font-size:12px;color:#888;line-height:2;display:none; }
.steps.show { display:block; }
.note { font-size:11px;color:#444;text-align:center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
      <path d="M3 17L17 3"/><circle cx="3" cy="17" r="1.8" fill="#fff" stroke="none"/><circle cx="17" cy="3" r="1.8" fill="#fff" stroke="none"/>
    </svg>
  </div>
  <div>
    <h1>Modern <span>Measure</span></h1>
    <h1 style="font-size:14px;font-weight:400;color:#666;margin-top:4px;">iOS Patcher v5</h1>
  </div>
  <p class="sub">Use your <strong style="color:#f0ede8">original</strong> canvas.html — never a previously patched file.</p>

  <div class="pick-wrap">
    <div class="pick-face">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 13v4h14v-4M10 3v10M6 7l4-4 4 4"/></svg>
      Choose canvas.html
    </div>
    <input type="file" id="file-input" accept=".html,text/html">
  </div>

  <div class="log" id="log"></div>
  <button id="dl-btn">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 13v4h14v-4M10 3v10M6 7l4-4 4 4"/></svg>
    Save canvas_ios.html
  </button>
  <div class="steps" id="steps">
    <div style="color:#f0ede8;font-weight:600;margin-bottom:4px;">To save on iPhone:</div>
    <div>1. Tap <b style="color:#f0ede8">Save canvas_ios.html</b> above</div>
    <div>2. Tap the <b style="color:#f0ede8">Share</b> icon (box ↑ arrow)</div>
    <div>3. Tap <b style="color:#f0ede8">Save to Files</b></div>
  </div>
  <p class="note">Runs entirely on-device. Your file never leaves your phone.</p>
</div>

<script>
var inp = document.getElementById('file-input');
var logEl = document.getElementById('log');
var dlBtn = document.getElementById('dl-btn');
var steps = document.getElementById('steps');
var patchedSrc = null;

function log(msg, cls) {
  logEl.classList.add('show');
  var d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

inp.addEventListener('change', function() {
  var file = this.files && this.files[0];
  logEl.innerHTML = '';
  dlBtn.classList.remove('show');
  steps.classList.remove('show');
  patchedSrc = null;
  if (!file) return;
  log('Reading ' + file.name + ' (' + Math.round(file.size/1024) + ' KB)…', 'info');
  var reader = new FileReader();
  reader.onerror = function() { log('Read error', 'err'); };
  reader.onload = function() {
    var src = reader.result;
    log(Math.round(src.length/1024) + ' KB loaded.', 'info');

    // Guard: already patched?
    if (src.indexOf('const isIOS=') !== -1) {
      log('⚠ This file already has iOS patches — use the ORIGINAL canvas.html', 'warn');
    }
    if (src.indexOf('const renderScale=2.0;') === -1) {
      log('⚠ renderScale=2.0 not found — may be wrong file or already patched', 'warn');
    }

    var r = applyPatches(src);
    log('');
    log(r.fail === 0
      ? '✓ All ' + r.ok + ' patches applied!'
      : r.ok + ' applied, ' + r.fail + ' failed', r.fail === 0 ? 'ok' : 'err');
    patchedSrc = r.src;
    dlBtn.classList.add('show');
    steps.classList.add('show');
  };
  reader.readAsText(file);
  this.value = '';
});

dlBtn.addEventListener('click', function() {
  if (!patchedSrc) return;
  var blob = new Blob([patchedSrc], {type:'text/html'});
  var file = new File([blob], 'canvas_ios.html', {type:'text/html'});
  if (navigator.canShare && navigator.canShare({files:[file]})) {
    navigator.share({files:[file], title:'canvas_ios.html'}).catch(function(){});
  } else {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'canvas_ios.html';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  }
});

// ════════════════════════════════════════════════════
// PATCHES
// ════════════════════════════════════════════════════

function applyPatches(src) {
  var ok = 0, fail = 0;

  // safe replace — only replaces if anchor found exactly once
  function patch(anchor, replacement, tag) {
    var idx = src.indexOf(anchor);
    if (idx === -1) { log('✗  ' + tag + ' — anchor not found', 'err'); fail++; return; }
    src = src.slice(0, idx) + replacement + src.slice(idx + anchor.length);
    log('✓  ' + tag, 'ok'); ok++;
  }
  function patchBefore(anchor, inject, tag) {
    patch(anchor, inject + anchor, tag);
  }
  function patchAfter(anchor, inject, tag) {
    patch(anchor, anchor + inject, tag);
  }

  // ── P1: isIOS detection + renderScale 1.0 ──────────────────────
  patch(
    'const renderScale=2.0;',
    'const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform===\'MacIntel\'&&navigator.maxTouchPoints>1);\nconst renderScale=isIOS?1.0:2.0;',
    'isIOS + renderScale 1.0 (was 2.0)'
  );

  // ── P2: Throbber CSS ────────────────────────────────────────────
  var lastStyle = src.lastIndexOf('</style>');
  if (lastStyle !== -1) {
    var css = [
      '  /* iOS throbber */',
      '  #ios-throbber{position:fixed;inset:0;z-index:600;background:rgba(10,10,10,0.88);',
      '    display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;',
      '    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}',
      '  #ios-throbber.show{display:flex;}',
      '  #ios-throbber-spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,0.12);',
      '    border-top-color:#ff0000;border-radius:50%;animation:ios-spin 0.8s linear infinite;}',
      '  @keyframes ios-spin{to{transform:rotate(360deg);}}',
      '  #ios-throbber-msg{font-family:\'DM Mono\',monospace;font-size:11px;color:#666;',
      '    letter-spacing:0.08em;text-transform:uppercase;}',
      ''
    ].join('\n');
    src = src.slice(0, lastStyle) + css + src.slice(lastStyle);
    log('✓  Throbber CSS', 'ok'); ok++;
  } else { log('✗  Throbber CSS — no </style>', 'err'); fail++; }

  // ── P3: Throbber HTML ───────────────────────────────────────────
  patchBefore(
    '<!-- SPLASH / ACCESS GATE -->',
    '<!-- iOS throbber -->\n<div id="ios-throbber"><div id="ios-throbber-spinner"></div><div id="ios-throbber-msg">Loading…</div></div>\n\n',
    'Throbber HTML'
  );

  // ── P4: iOS helper functions (after workerSrc) ──────────────────
  // These are injected as a self-contained block — safe even if isIOS is false
  var workerLine = "pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';";
  patchAfter(workerLine,
    '\n\n// ── iOS helpers ──\nvar _iosThrobber=null,_iosThrobberMsg=null;\n' +
    'function _initThrobber(){if(_iosThrobber)return;_iosThrobber=document.getElementById(\'ios-throbber\');_iosThrobberMsg=document.getElementById(\'ios-throbber-msg\');}\n' +
    'function showThrobber(msg){if(!isIOS)return;_initThrobber();if(_iosThrobber)_iosThrobber.classList.add(\'show\');if(_iosThrobberMsg&&msg)_iosThrobberMsg.textContent=msg;}\n' +
    'function hideThrobber(){_initThrobber();if(_iosThrobber)_iosThrobber.classList.remove(\'show\');}\n' +
    'if(isIOS){\n' +
    '  document.addEventListener(\'visibilitychange\',function(){\n' +
    '    if(document.visibilityState===\'visible\'&&pdfDoc)renderPage(currentPage);\n' +
    '  });\n' +
    '  window.addEventListener(\'pageshow\',function(e){\n' +
    '    if(e.persisted&&pdfDoc)renderPage(currentPage);\n' +
    '  });\n' +
    '}\n',
    'iOS helpers + visibility recovery'
  );

  // ── P5: Batched geometry extractor for iOS ──────────────────────
  // Injected after the existing extractPageGeometry function
  var afterExtractor = '  } catch(e) {\n  }\n\n}\n';
  patchAfter(afterExtractor,
    '\n// ── iOS batched geometry extractor ──\n' +
    'async function extractPageGeometryIOS(page,viewport){\n' +
    '  pageSegments=[];snapGrid=null;\n' +
    '  var vt=viewport.transform;\n' +
    '  function cc(c,m){return[c[0]*m[0]+c[2]*m[1],c[1]*m[0]+c[3]*m[1],c[0]*m[2]+c[2]*m[3],c[1]*m[2]+c[3]*m[3],c[0]*m[4]+c[2]*m[5]+c[4],c[1]*m[4]+c[3]*m[5]+c[5]];}\n' +
    '  function mh(ctm){\n' +
    '    function pc(px,py){var x=ctm[0]*px+ctm[2]*py+ctm[4],y=ctm[1]*px+ctm[3]*py+ctm[5];return{x:vt[0]*x+vt[2]*y+vt[4],y:vt[1]*x+vt[3]*y+vt[5]};}\n' +
    '    function ps(ax,ay,bx,by){var p1=pc(ax,ay),p2=pc(bx,by);if(Math.hypot(p2.x-p1.x,p2.y-p1.y)>=2)pageSegments.push({x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,isCurve:false});}\n' +
    '    return{pdfToCanvas:pc,pushSeg:ps};\n' +
    '  }\n' +
    '  function yn(){return new Promise(function(r){setTimeout(r,0);});}\n' +
    '  try{\n' +
    '    var ops=await page.getOperatorList(),fn=ops.fnArray,ar=ops.argsArray;\n' +
    '    var ctm=[1,0,0,1,0,0],st=[ctm.slice()];\n' +
    '    for(var i=0;i<fn.length;i++){\n' +
    '      if(i%40===0)await yn();\n' +
    '      var f=fn[i],a=ar[i];\n' +
    '      if(f===_OPC.save)st.push(ctm.slice());\n' +
    '      else if(f===_OPC.restore){if(st.length>1)ctm=st.pop();}\n' +
    '      else if(f===_OPC.transform)ctm=cc(ctm,a);\n' +
    '      else if(f===_OPC.paintFormXObjectBegin){st.push(ctm.slice());if(a&&Array.isArray(a[1])&&a[1].length===6)ctm=cc(ctm,a[1]);}\n' +
    '      else if(f===_OPC.paintFormXObjectEnd){if(st.length>1)ctm=st.pop();}\n' +
    '      else if(f===_OPC.constructPath){\n' +
    '        var h=mh(ctm);decodeConstructPath(a[0],a[1],h.pdfToCanvas,h.pushSeg);\n' +
    '        if(pageSegments.length%300===0)await yn();\n' +
    '      }\n' +
    '    }\n' +
    '    await yn();\n' +
    '    var seen=new Set(),dd=[];\n' +
    '    for(var j=0;j<pageSegments.length;j++){\n' +
    '      if(j%500===0)await yn();\n' +
    '      var s=pageSegments[j];\n' +
    '      var k=Math.round(s.x1)+\',\'+Math.round(s.y1)+\',\'+Math.round(s.x2)+\',\'+Math.round(s.y2);\n' +
    '      var r=Math.round(s.x2)+\',\'+Math.round(s.y2)+\',\'+Math.round(s.x1)+\',\'+Math.round(s.y1);\n' +
    '      if(!seen.has(k)&&!seen.has(r)){seen.add(k);dd.push(s);}\n' +
    '    }\n' +
    '    pageSegments=dd;await yn();\n' +
    '    snapGrid=buildSnapGrid(pageSegments);\n' +
    '  }catch(e){console.warn(\'[iOS snap]\',e);}\n' +
    '}\n',
    'iOS batched extractor'
  );

  // ── P6: Update renderPage to use iOS batched extractor ──────────
  // Replaces only the extractPageGeometry call at the end of renderPage
  var oldExtractCall = [
    '      extractPageGeometry(page, vp).then(() => {',
    '              if (pageSegments.length > 0) {',
    '          if (snapEnabled) drawGeometryOverlay();',
    '        }',
    '      });'
  ].join('\n');
  var newExtractCall = [
    '      if(isIOS){',
    '        showThrobber(\'Indexing…\');',
    '        extractPageGeometryIOS(page,vp).then(function(){',
    '          hideThrobber();',
    '          if(pageSegments.length>0&&snapEnabled)drawGeometryOverlay();',
    '          try{page.cleanup();}catch(e){}',
    '        }).catch(function(e){console.warn(e);hideThrobber();});',
    '      } else {',
    '        extractPageGeometry(page, vp).then(() => {',
    '              if (pageSegments.length > 0) {',
    '          if (snapEnabled) drawGeometryOverlay();',
    '        }',
    '        });',
    '      }'
  ].join('\n');
  patch(oldExtractCall, newExtractCall, 'renderPage → iOS batched extractor');

  // ── P7: rAF-debounce redrawOverlay on iOS ───────────────────────
  var screenToCanvasFn = 'function screenToCanvas(sx,sy) {\n  const r=canvasViewport.getBoundingClientRect();\n  return { x:(sx-r.left-panX)/zoom, y:(sy-r.top-panY)/zoom };\n}';
  patchBefore(screenToCanvasFn,
    '// iOS: throttle redrawOverlay with rAF\n' +
    'if(isIOS){\n' +
    '  var _origRedraw=redrawOverlay,_raf=null;\n' +
    '  redrawOverlay=function(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(function(){_raf=null;_origRedraw();});};\n' +
    '}\n\n',
    'rAF-debounce redrawOverlay (iOS)'
  );

  // ── P8: Cache getBoundingClientRect on iOS ──────────────────────
  patch(
    'function screenToCanvas(sx,sy) {\n  const r=canvasViewport.getBoundingClientRect();\n  return { x:(sx-r.left-panX)/zoom, y:(sy-r.top-panY)/zoom };\n}',
    'var _vpRect=null;\n' +
    'window.addEventListener(\'resize\',function(){_vpRect=null;},{passive:true});\n' +
    'window.addEventListener(\'orientationchange\',function(){_vpRect=null;},{passive:true});\n' +
    'function screenToCanvas(sx,sy){\n' +
    '  var r=isIOS?(_vpRect||(_vpRect=canvasViewport.getBoundingClientRect())):canvasViewport.getBoundingClientRect();\n' +
    '  return{x:(sx-r.left-panX)/zoom,y:(sy-r.top-panY)/zoom};\n' +
    '}',
    'Cache getBoundingClientRect (iOS)'
  );

  // ── P9: Defer auto-restore on iOS ───────────────────────────────
  // Try two possible anchor formats (single-line and multi-line)
  var p9a = 'if(bytes){ loadSessionFromStore(latest.filename); }';
  var p9b = '      if(bytes){\n        loadSessionFromStore(latest.filename);\n      }';
  var p9new_a = 'if(bytes){\n        if(isIOS){document.addEventListener(\'pointerdown\',function _r(){document.removeEventListener(\'pointerdown\',_r);loadSessionFromStore(latest.filename);},{once:true,passive:true});}else{loadSessionFromStore(latest.filename);}\n      }';
  var p9new_b = '      if(bytes){\n        if(isIOS){document.addEventListener(\'pointerdown\',function _r(){document.removeEventListener(\'pointerdown\',_r);loadSessionFromStore(latest.filename);},{once:true,passive:true});}else{loadSessionFromStore(latest.filename);}\n      }';
  if (src.indexOf(p9a) !== -1) {
    patch(p9a, p9new_a, 'Defer auto-restore until first tap (iOS)');
  } else if (src.indexOf(p9b) !== -1) {
    patch(p9b, p9new_b, 'Defer auto-restore until first tap (iOS)');
  } else {
    log('✗  Defer auto-restore — anchor not found', 'err'); fail++;
  }

  // ── P10: Free PDF bytes after save ──────────────────────────────
  patch(
    'tx.oncomplete=()=>res(true);\n      tx.onerror=e=>rej(e.target.error);',
    'tx.oncomplete=()=>{if(isIOS){currentPdfBytes=null;}res(true);};\n      tx.onerror=e=>rej(e.target.error);',
    'Free PDF bytes after IDB save (iOS)'
  );

  return {src: src, ok: ok, fail: fail};
}
</script>
</body>
</html>
