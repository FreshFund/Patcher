<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeasurePDF iOS Patcher v14</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: #0f0f0f; color: #f0ede8; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
.card {
  width: 100%; max-width: 380px; background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 20px; padding: 28px 24px; display: flex; flex-direction: column; gap: 20px;
}
.logo { width:44px;height:44px;background:#ff0000;border-radius:12px;display:flex;align-items:center;justify-content:center; }
h1 { font-size:18px; font-weight:600; }
h1 span { color:#ff0000; }
p.sub { font-size:13px; color:#666; line-height:1.6; }
.pick-wrap { position:relative; width:100%; height:52px; }
.pick-face {
  position:absolute;inset:0;background:#ff0000;color:#fff;border:none;border-radius:14px;
  font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;pointer-events:none;
}
.pick-wrap:active .pick-face { background:#cc0000; }
#file-input { position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:16px; }
.log {
  background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:14px;
  font-family:'SF Mono',Menlo,monospace;font-size:12px;line-height:1.8;color:#888;
  display:none;max-height:320px;overflow-y:auto;
}
.log.show { display:block; }
.ok   { color:#27ae60; }
.err  { color:#e74c3c; }
.warn { color:#f39c12; }
.info { color:#3498db; }
#dl-btn {
  display:none;width:100%;height:52px;background:#27ae60;color:#fff;border:none;
  border-radius:14px;font-size:16px;font-weight:600;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
#dl-btn.show { display:flex; }
#dl-btn:active { background:#219a52; }
.steps { background:#111;border:1px solid #2a2a2a;border-radius:12px;padding:14px;font-size:12px;color:#888;line-height:2;display:none; }
.steps.show { display:block; }
.note { font-size:11px;color:#444;text-align:center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
      <path d="M3 17L17 3"/><circle cx="3" cy="17" r="1.8" fill="#fff" stroke="none"/>
      <circle cx="17" cy="3" r="1.8" fill="#fff" stroke="none"/>
    </svg>
  </div>
  <div>
    <h1>Modern <span>Measure</span></h1>
    <h1 style="font-size:14px;font-weight:400;color:#666;margin-top:4px;">iOS Patcher v14</h1>
  </div>
  <p class="sub">Fixes aggressive-pan + restore crashes. Use your <strong style="color:#f0ede8">original</strong> canvas.html only.</p>

  <div class="pick-wrap">
    <div class="pick-face">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M3 13v4h14v-4M10 3v10M6 7l4-4 4 4"/>
      </svg>
      Choose canvas.html
    </div>
    <input type="file" id="file-input" accept=".html,text/html">
  </div>

  <div class="log" id="log"></div>

  <button id="dl-btn">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M3 13v4h14v-4M10 3v10M6 7l4-4 4 4"/>
    </svg>
    Save canvas_ios.html
  </button>

  <div class="steps" id="steps">
    <div style="color:#f0ede8;font-weight:600;margin-bottom:4px;">To save on iPhone:</div>
    <div>1. Tap <b style="color:#f0ede8">Save canvas_ios.html</b> above</div>
    <div>2. Tap the <b style="color:#f0ede8">Share</b> icon (box ↑ arrow)</div>
    <div>3. Tap <b style="color:#f0ede8">Save to Files</b></div>
  </div>
  <p class="note">Runs entirely on-device. Your file never leaves your phone.</p>
</div>

<script>
var inp    = document.getElementById('file-input');
var logEl  = document.getElementById('log');
var dlBtn  = document.getElementById('dl-btn');
var steps  = document.getElementById('steps');
var output = null;

function log(msg, cls) {
  logEl.classList.add('show');
  var d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

inp.addEventListener('change', function () {
  var file = this.files && this.files[0];
  logEl.innerHTML = '';
  dlBtn.classList.remove('show');
  steps.classList.remove('show');
  output = null;
  if (!file) return;

  log('Reading ' + file.name + ' (' + Math.round(file.size / 1024) + ' KB)…', 'info');
  var reader = new FileReader();
  reader.onerror = function () { log('Read error', 'err'); };
  reader.onload = function () {
    var src = reader.result;
    log(Math.round(src.length / 1024) + ' KB loaded.', 'info');

    if (src.indexOf('ios-v14') !== -1) {
      log('Already patched with v14 — use the ORIGINAL canvas.html', 'warn');
    }
    if (src.indexOf('const renderScale=2.0;') === -1) {
      log('renderScale=2.0 not found — may be wrong file', 'warn');
    }

    var result = applyAll(src);
    log('');
    log(result.fail === 0
      ? 'All ' + result.ok + ' patches applied!'
      : result.ok + ' applied, ' + result.fail + ' failed',
      result.fail === 0 ? 'ok' : 'err');
    output = result.src;
    dlBtn.classList.add('show');
    steps.classList.add('show');
  };
  reader.readAsText(file);
  this.value = '';
});

dlBtn.addEventListener('click', function () {
  if (!output) return;
  var blob = new Blob([output], { type: 'text/html' });
  var file = new File([blob], 'canvas_ios.html', { type: 'text/html' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: 'canvas_ios.html' }).catch(function () {});
  } else {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = 'canvas_ios.html';
    document.body.appendChild(a); a.click();
    setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  }
});

function applyAll(src) {
  var ok = 0, fail = 0;

  function swap(anchor, replacement, label) {
    var i = src.indexOf(anchor);
    if (i === -1) { log('  ' + label + ' — anchor not found', 'err'); fail++; return false; }
    src = src.slice(0, i) + replacement + src.slice(i + anchor.length);
    log('  ' + label, 'ok'); ok++; return true;
  }
  function rswap(re, replacement, label) {
    if (!re.test(src)) { log('  ' + label + ' — not found', 'err'); fail++; return false; }
    src = src.replace(re, replacement);
    log('  ' + label, 'ok'); ok++; return true;
  }

  // ── P1: isIOS + renderScale 1.0 ─────────────────────────────
  swap(
    'const renderScale=2.0;',
    'const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||\n' +
    '  (navigator.platform === \'MacIntel\' && navigator.maxTouchPoints > 1);\n' +
    'const renderScale = isIOS ? 1.0 : 2.0;',
    'P1 — isIOS + renderScale 1.0'
  );

  // ── P2: Skip SVG rebuild while ANY finger is touching ────────
  //
  // CRASH CAUSE (aggressive pan):
  //   applyTransform() → redrawOverlay() on every pointermove.
  //   Even a 150ms debounce fires 6-7× per second during sustained pan.
  //   Each call rebuilds the entire SVG DOM. On iOS = OOM.
  //
  // FIX: self-rescheduling debounce.
  //   When the timer fires, check activePointers.
  //   If fingers still down → reschedule instead of drawing.
  //   When fingers lift → fire exactly once.
  //   Zero SVG rebuilds during the entire pan gesture.
  swap(
    '  // Redraw labels in real-time during pinch \u2014 rAF-throttled so we never queue more than one\n' +
    '  cancelAnimationFrame(_rafRedraw);\n' +
    '  _rafRedraw = requestAnimationFrame(()=>{ redrawOverlay(); });',
    '  if (isIOS) {\n' +
    '    // Skip rebuild while touching — reschedule until fingers lift\n' +
    '    clearTimeout(_iosRDTimer);\n' +
    '    _iosRDTimer = setTimeout(function _iosRD() {\n' +
    '      if (Object.keys(activePointers).length > 0) {\n' +
    '        _iosRDTimer = setTimeout(_iosRD, 32); // still touching, wait\n' +
    '      } else {\n' +
    '        redrawOverlay(); // fingers lifted — draw once\n' +
    '      }\n' +
    '    }, 32);\n' +
    '  } else {\n' +
    '    cancelAnimationFrame(_rafRedraw);\n' +
    '    _rafRedraw = requestAnimationFrame(function () { redrawOverlay(); });\n' +
    '  }',
    'P2 — skip SVG rebuild while touching (fixes aggressive-pan crash)'
  );

  // ── P3: Declare _iosRDTimer ──────────────────────────────────
  swap(
    'let _rafRedraw = null',
    'let _rafRedraw = null, _iosRDTimer = null',
    'P3 — declare _iosRDTimer'
  );

  // ── P4: Cache getBoundingClientRect ─────────────────────────
  swap(
    'function screenToCanvas(sx,sy) {\n' +
    '  const r=canvasViewport.getBoundingClientRect();\n' +
    '  return { x:(sx-r.left-panX)/zoom, y:(sy-r.top-panY)/zoom };\n' +
    '}',
    'var _vpRectCache = null;\n' +
    'if (isIOS) {\n' +
    '  window.addEventListener(\'resize\', function () { _vpRectCache = null; }, { passive: true });\n' +
    '  window.addEventListener(\'orientationchange\', function () { _vpRectCache = null; }, { passive: true });\n' +
    '}\n' +
    'function screenToCanvas(sx, sy) {\n' +
    '  var r = isIOS\n' +
    '    ? (_vpRectCache || (_vpRectCache = canvasViewport.getBoundingClientRect()))\n' +
    '    : canvasViewport.getBoundingClientRect();\n' +
    '  return { x: (sx - r.left - panX) / zoom, y: (sy - r.top - panY) / zoom };\n' +
    '}',
    'P4 — cache getBoundingClientRect'
  );

  // ── P5: Batched extractor + sibling-SVG overlay ──────────────
  //
  // Two sub-fixes:
  //   A) Batched extractor: yields via setTimeout(0) every 30 ops
  //      so WKWebView never kills us for blocking the main thread.
  //
  //   B) Sibling SVG overlay: geometry path goes in a separate
  //      <svg id="_iosGeoSvg"> SIBLING to svgOverlay.
  //      redrawOverlay() does svgOverlay.innerHTML='' — that nuked
  //      the geometry path in v13, forcing expensive recreation on
  //      every redraw. Now it's untouched by redrawOverlay.
  //      Only cleared when changing pages.
  var afterExtractor = '  } catch(e) {\n  }\n\n}\n';
  var batchedCode =
    '\n// ── iOS: batched extractor + sibling-SVG overlay (ios-v14) ──\n' +
    'async function extractPageGeometryIOS(page, viewport) {\n' +
    '  // Clear sibling overlay immediately\n' +
    '  var geoSvg = document.getElementById(\'_iosGeoSvg\');\n' +
    '  if (geoSvg) geoSvg.innerHTML = \'\';\n' +
    '  pageSegments = []; snapGrid = null;\n' +
    '  var vt = viewport.transform;\n' +
    '  function cc(c, m) {\n' +
    '    return [c[0]*m[0]+c[2]*m[1], c[1]*m[0]+c[3]*m[1],\n' +
    '            c[0]*m[2]+c[2]*m[3], c[1]*m[2]+c[3]*m[3],\n' +
    '            c[0]*m[4]+c[2]*m[5]+c[4], c[1]*m[4]+c[3]*m[5]+c[5]];\n' +
    '  }\n' +
    '  function makeH(ctm) {\n' +
    '    function pc(px, py) {\n' +
    '      var x = ctm[0]*px + ctm[2]*py + ctm[4];\n' +
    '      var y = ctm[1]*px + ctm[3]*py + ctm[5];\n' +
    '      return { x: vt[0]*x + vt[2]*y + vt[4], y: vt[1]*x + vt[3]*y + vt[5] };\n' +
    '    }\n' +
    '    function ps(ax, ay, bx, by) {\n' +
    '      var p1 = pc(ax, ay), p2 = pc(bx, by);\n' +
    '      if (Math.hypot(p2.x-p1.x, p2.y-p1.y) >= 2)\n' +
    '        pageSegments.push({ x1:p1.x, y1:p1.y, x2:p2.x, y2:p2.y, isCurve:false });\n' +
    '    }\n' +
    '    return { pdfToCanvas: pc, pushSeg: ps };\n' +
    '  }\n' +
    '  function yn() { return new Promise(function(r) { setTimeout(r, 0); }); }\n' +
    '  try {\n' +
    '    var ops = await page.getOperatorList();\n' +
    '    var fn = ops.fnArray, ar = ops.argsArray;\n' +
    '    var ctm = [1,0,0,1,0,0], st = [[1,0,0,1,0,0]];\n' +
    '    for (var i = 0; i < fn.length; i++) {\n' +
    '      if (i % 30 === 0) await yn();\n' +
    '      var f = fn[i], a = ar[i];\n' +
    '      if      (f === _OPC.save)   { st.push(ctm.slice()); }\n' +
    '      else if (f === _OPC.restore) { if (st.length > 1) ctm = st.pop(); }\n' +
    '      else if (f === _OPC.transform) { ctm = cc(ctm, a); }\n' +
    '      else if (f === _OPC.paintFormXObjectBegin) {\n' +
    '        st.push(ctm.slice());\n' +
    '        if (a && Array.isArray(a[1]) && a[1].length === 6) ctm = cc(ctm, a[1]);\n' +
    '      }\n' +
    '      else if (f === _OPC.paintFormXObjectEnd) { if (st.length > 1) ctm = st.pop(); }\n' +
    '      else if (f === _OPC.constructPath) {\n' +
    '        var h = makeH(ctm);\n' +
    '        decodeConstructPath(a[0], a[1], h.pdfToCanvas, h.pushSeg);\n' +
    '      }\n' +
    '    }\n' +
    '    await yn();\n' +
    '    var seen = new Set(), dd = [];\n' +
    '    for (var j = 0; j < pageSegments.length; j++) {\n' +
    '      if (j % 500 === 0) await yn();\n' +
    '      var s = pageSegments[j];\n' +
    '      var k   = Math.round(s.x1)+\',\'+Math.round(s.y1)+\',\'+Math.round(s.x2)+\',\'+Math.round(s.y2);\n' +
    '      var rev = Math.round(s.x2)+\',\'+Math.round(s.y2)+\',\'+Math.round(s.x1)+\',\'+Math.round(s.y1);\n' +
    '      if (!seen.has(k) && !seen.has(rev)) { seen.add(k); dd.push(s); }\n' +
    '    }\n' +
    '    pageSegments = dd;\n' +
    '    snapGrid = buildSnapGrid(pageSegments);\n' +
    '    await yn();\n' +
    '  } catch(e) { console.warn(\'[iOS snap]\', e); }\n' +
    '}\n' +
    '\n' +
    '// Render all geometry as ONE <path> in a sibling SVG — never inside svgOverlay\n' +
    '// so redrawOverlay() (which clears svgOverlay.innerHTML) never touches it.\n' +
    'function drawGeometryOverlayIOS() {\n' +
    '  var ns = \'http://www.w3.org/2000/svg\';\n' +
    '  var geo = document.getElementById(\'_iosGeoSvg\');\n' +
    '  if (!geo) {\n' +
    '    geo = document.createElementNS(ns, \'svg\');\n' +
    '    geo.id = \'_iosGeoSvg\';\n' +
    '    geo.setAttribute(\'pointer-events\', \'none\');\n' +
    '    geo.style.cssText = \'position:absolute;top:0;left:0;overflow:visible;\';\n' +
    '    svgOverlay.parentNode.insertBefore(geo, svgOverlay);\n' +
    '  }\n' +
    '  geo.setAttribute(\'width\',  svgOverlay.getAttribute(\'width\'));\n' +
    '  geo.setAttribute(\'height\', svgOverlay.getAttribute(\'height\'));\n' +
    '  geo.innerHTML = \'\';\n' +
    '  if (!pageSegments || pageSegments.length === 0) return;\n' +
    '  var d = \'\';\n' +
    '  for (var i = 0; i < pageSegments.length; i++) {\n' +
    '    var s = pageSegments[i];\n' +
    '    d += \'M\' + s.x1.toFixed(1) + \',\' + s.y1.toFixed(1) +\n' +
    '         \'L\' + s.x2.toFixed(1) + \',\' + s.y2.toFixed(1);\n' +
    '  }\n' +
    '  var path = document.createElementNS(ns, \'path\');\n' +
    '  path.setAttribute(\'d\', d);\n' +
    '  path.setAttribute(\'stroke\', \'rgba(39,174,96,0.2)\');\n' +
    '  path.setAttribute(\'stroke-width\', \'0.8\');\n' +
    '  path.setAttribute(\'fill\', \'none\');\n' +
    '  geo.appendChild(path);\n' +
    '}\n';

  swap(afterExtractor, afterExtractor + batchedCode,
    'P5 — batched extractor + sibling-SVG overlay (snap preserved, no DOM flood)');

  // ── P6: Route renderPage to iOS extractor ────────────────────
  rswap(
    /extractPageGeometry\(page,\s*vp\)\.then\(\s*\(\)\s*=>\s*\{[\s\S]*?if\s*\(snapEnabled\)\s*drawGeometryOverlay\(\);\s*\}\s*\}\s*\);/,
    'if (isIOS) {\n' +
    '        extractPageGeometryIOS(page, vp).then(function () {\n' +
    '          if (pageSegments.length > 0 && snapEnabled) drawGeometryOverlayIOS();\n' +
    '        });\n' +
    '      } else {\n' +
    '        extractPageGeometry(page, vp).then(() => {\n' +
    '              if (pageSegments.length > 0) {\n' +
    '          if (snapEnabled) drawGeometryOverlay();\n' +
    '        }\n' +
    '        });\n' +
    '      }',
    'P6 — route renderPage to iOS extractor'
  );

  // ── P7: Free bytes in loadSessionFromStore ───────────────────
  //
  // CRASH CAUSE (restore → first tap):
  //   loadSessionFromStore loads bytes from IDB into currentPdfBytes,
  //   hands them to pdf.js, then NEVER frees them.
  //   So on restore: bytes + canvas + geometry all in RAM = OOM on tap.
  //
  //   P8 below frees bytes after IDB *save*. This patch frees after
  //   IDB *restore* — a different code path entirely.
  //
  //   Unique anchor: the comment only present in loadSessionFromStore.
  swap(
    'renderPage(currentPage, true); // renderPage calls loadSession which restores measurements',
    'if (isIOS) { currentPdfBytes = null; } // free bytes — pdf.js worker has them now\n' +
    '    renderPage(currentPage, true); // renderPage calls loadSession which restores measurements',
    'P7 — free bytes in loadSessionFromStore after pdf.js resolves (restore crash)'
  );

  // ── P8: Defer auto-restore until first tap (regex) ───────────
  rswap(
    /if\s*\(\s*bytes\s*\)\s*\{\s*loadSessionFromStore\s*\(\s*latest\.filename\s*\)\s*;\s*\}/,
    'if (bytes) {\n' +
    '        if (isIOS) {\n' +
    '          document.addEventListener(\'pointerdown\', function _dr() {\n' +
    '            document.removeEventListener(\'pointerdown\', _dr);\n' +
    '            loadSessionFromStore(latest.filename);\n' +
    '          }, { once: true, passive: true });\n' +
    '        } else {\n' +
    '          loadSessionFromStore(latest.filename);\n' +
    '        }\n' +
    '      }',
    'P8 — defer auto-restore until first tap'
  );

  // ── P9: Free bytes after IDB save ────────────────────────────
  rswap(
    /tx\.oncomplete\s*=\s*\(\)\s*=>\s*res\(true\);/,
    'tx.oncomplete = () => { if (isIOS) { currentPdfBytes = null; } res(true); };',
    'P9 — free bytes after IDB save'
  );

  // ── P10: Version badge ───────────────────────────────────────
  var bodyIdx = src.lastIndexOf('</body>');
  if (bodyIdx !== -1) {
    src = src.slice(0, bodyIdx) +
      '\n<!-- ios-v14 -->\n' +
      '<div style="position:fixed;bottom:4px;right:6px;z-index:9999;' +
      'font-family:monospace;font-size:9px;color:rgba(255,255,255,0.25);' +
      'pointer-events:none;letter-spacing:0.05em;">ios-v14</div>\n' +
      src.slice(bodyIdx);
    log('  P10 — version badge (ios-v14)', 'ok'); ok++;
  } else {
    log('  P10 — no </body> found', 'err'); fail++;
  }

  return { src: src, ok: ok, fail: fail };
}
</script>
</body>
</html>
