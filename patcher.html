<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeasurePDF iOS Patcher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: #0f0f0f; color: #f0ede8; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 20px; padding: 28px 24px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .logo {
    width: 44px; height: 44px; background: #ff0000;
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 22px; height: 22px; }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  h1 span { color: #ff0000; }
  p.sub { font-size: 13px; color: #666; line-height: 1.6; }
  .pick-btn {
    width: 100%; height: 52px;
    background: #ff0000; color: #fff; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .pick-btn:active { background: #cc0000; transform: scale(0.97); }
  #file-input { display: none; }
  .log {
    background: #111; border: 1px solid #2a2a2a; border-radius: 12px;
    padding: 14px; font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px; line-height: 1.8; color: #888;
    display: none; max-height: 220px; overflow-y: auto;
  }
  .log.show { display: block; }
  .ok   { color: #27ae60; }
  .err  { color: #e74c3c; }
  .info { color: #3498db; }
  .dl-btn {
    width: 100%; height: 52px;
    background: #27ae60; color: #fff; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    display: none; align-items: center; justify-content: center; gap: 8px;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none;
  }
  .dl-btn.show { display: flex; }
  .dl-btn:active { background: #219a52; transform: scale(0.97); }
  .note { font-size: 11px; color: #444; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
      <path d="M3 17L17 3"/>
      <circle cx="3" cy="17" r="1.8" fill="#fff" stroke="none"/>
      <circle cx="17" cy="3" r="1.8" fill="#fff" stroke="none"/>
    </svg>
  </div>
  <div>
    <h1>Modern <span>Measure</span></h1>
    <h1 style="font-size:14px;font-weight:400;color:#666;margin-top:4px;">iOS Patcher</h1>
  </div>
  <p class="sub">Patches canvas.html with iOS optimisations: throbber overlay, reduced render scale (1.5×), and batched geometry extraction to prevent crashes.</p>

  <label class="pick-btn">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M3 13v4h14v-4M10 3v10M6 7l4-4 4 4"/>
    </svg>
    Choose canvas.html
    <input type="file" id="file-input" accept=".html">
  </label>

  <div class="log" id="log"></div>

  <a class="dl-btn" id="dl-btn" download="canvas_ios.html">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M10 3v10M6 13l4 4 4-4M3 17h14"/>
    </svg>
    Download canvas_ios.html
  </a>

  <p class="note">Runs entirely on-device. Your file never leaves your phone.</p>
</div>

<script>
const fileInput = document.getElementById('file-input');
const logEl     = document.getElementById('log');
const dlBtn     = document.getElementById('dl-btn');

function log(msg, cls) {
  logEl.classList.add('show');
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── patch strings ──────────────────────────────────────────────────────────

const THROBBER_CSS = `
  /* ── iOS LOADING THROBBER ── */
  #ios-throbber {
    position: fixed; inset: 0; z-index: 600;
    background: rgba(10,10,10,0.88);
    display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  #ios-throbber.show { display: flex; }
  #ios-throbber-spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: ios-spin 0.8s linear infinite;
  }
  @keyframes ios-spin { to { transform: rotate(360deg); } }
  #ios-throbber-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
`;

const THROBBER_HTML = '\n<!-- iOS LOADING THROBBER -->\n<div id="ios-throbber">\n  <div id="ios-throbber-spinner"></div>\n  <div id="ios-throbber-label">Loading page\u2026</div>\n</div>\n';

const IOS_DETECTION = `
// \u2500\u2500 iOS DETECTION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const renderScale = isIOS ? 1.5 : 2.0;
`;

const THROBBER_JS = `
// \u2500\u2500 iOS THROBBER HELPERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const _throbberEl  = document.getElementById('ios-throbber');
const _throbberLbl = document.getElementById('ios-throbber-label');
function showThrobber(msg) {
  if (!isIOS) return;
  if (_throbberEl) {
    _throbberEl.classList.add('show');
    if (_throbberLbl && msg) _throbberLbl.textContent = msg;
  }
}
function hideThrobber() {
  if (_throbberEl) _throbberEl.classList.remove('show');
}
`;

const OLD_RENDER_PAGE = [
  'function renderPage(num, reset=false) {',
  '  pdfDoc.getPage(num).then(page => {',
  '    const vp = page.getViewport({ scale: renderScale });',
  '    pdfCanvas.width=vp.width; pdfCanvas.height=vp.height;',
  '    svgOverlay.setAttribute(\'width\', vp.width);',
  '    svgOverlay.setAttribute(\'height\', vp.height);',
  '    touchLayer.style.width=vp.width+\'px\';',
  '    touchLayer.style.height=vp.height+\'px\';',
  '    page.render({ canvasContext: pdfCanvas.getContext(\'2d\'), viewport: vp }).promise.then(() => {',
  '      if (reset) {',
  '        fitToScreen();',
  '        // Try to restore session for this filename',
  '        loadSession(currentFilename);',
  '        // Default to select mode on fresh load',
  '        if (!mode) {',
  '          mode = \'select\';',
  '          selectBtn.classList.add(\'active\');',
  '        }',
  '      }',
  '      redrawOverlay();',
  '      pagePill.textContent=`${num}/${totalPages}`;',
  '      // Extract CAD geometry for snapping (async, non-blocking)',
  '      extractPageGeometry(page, vp).then(() => {',
  '              if (pageSegments.length > 0) {',
  '          if (snapEnabled) drawGeometryOverlay();',
  '        }',
  '      });',
  '    });',
  '  });',
  '}'
].join('\n');

const IOS_RENDER_PAGE = [
  'function renderPage(num, reset=false) {',
  '  if (isIOS) showThrobber(\'Loading page\u2026\');',
  '  pdfDoc.getPage(num).then(page => {',
  '    const vp = page.getViewport({ scale: renderScale });',
  '    pdfCanvas.width=vp.width; pdfCanvas.height=vp.height;',
  '    svgOverlay.setAttribute(\'width\', vp.width);',
  '    svgOverlay.setAttribute(\'height\', vp.height);',
  '    touchLayer.style.width=vp.width+\'px\';',
  '    touchLayer.style.height=vp.height+\'px\';',
  '    page.render({ canvasContext: pdfCanvas.getContext(\'2d\'), viewport: vp }).promise.then(() => {',
  '      if (reset) {',
  '        fitToScreen();',
  '        loadSession(currentFilename);',
  '        if (!mode) { mode = \'select\'; selectBtn.classList.add(\'active\'); }',
  '      }',
  '      redrawOverlay();',
  '      pagePill.textContent=`${num}/${totalPages}`;',
  '      if (isIOS) {',
  '        extractPageGeometryIOS(page, vp).then(() => {',
  '          hideThrobber();',
  '          if (pageSegments.length > 0 && snapEnabled) drawGeometryOverlay();',
  '        }).catch(() => hideThrobber());',
  '      } else {',
  '        extractPageGeometry(page, vp).then(() => {',
  '              if (pageSegments.length > 0) {',
  '          if (snapEnabled) drawGeometryOverlay();',
  '        }',
  '        });',
  '      }',
  '    });',
  '  });',
  '}'
].join('\n');

const BATCHED_EXTRACTOR = `
// \u2500\u2500 BATCHED iOS GEOMETRY EXTRACTION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
async function extractPageGeometryIOS(page, viewport) {
  pageSegments = []; snapGrid = null;
  const vt = viewport.transform;
  function concatCTM(c,m){return[c[0]*m[0]+c[2]*m[1],c[1]*m[0]+c[3]*m[1],c[0]*m[2]+c[2]*m[3],c[1]*m[2]+c[3]*m[3],c[0]*m[4]+c[2]*m[5]+c[4],c[1]*m[4]+c[3]*m[5]+c[5]];}
  function makeHelpers(ctm){
    function pdfToCanvas(px,py){const x=ctm[0]*px+ctm[2]*py+ctm[4],y=ctm[1]*px+ctm[3]*py+ctm[5];return{x:vt[0]*x+vt[2]*y+vt[4],y:vt[1]*x+vt[3]*y+vt[5]};}
    function pushSeg(ax,ay,bx,by){const p1=pdfToCanvas(ax,ay),p2=pdfToCanvas(bx,by);if(Math.hypot(p2.x-p1.x,p2.y-p1.y)>=2)pageSegments.push({x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,isCurve:false});}
    return{pdfToCanvas,pushSeg};
  }
  function yieldToUI(){return new Promise(res=>setTimeout(res,0));}
  try{
    const ops=await page.getOperatorList(),fn=ops.fnArray,ar=ops.argsArray,B=150;
    let ctm=[1,0,0,1,0,0];const stack=[ctm];
    for(let i=0;i<fn.length;i++){
      if(i>0&&i%B===0)await yieldToUI();
      const f=fn[i],a=ar[i];
      if(f===_OPC.save){stack.push([...ctm]);}
      else if(f===_OPC.restore){if(stack.length>1)ctm=stack.pop();}
      else if(f===_OPC.transform){ctm=concatCTM(ctm,a);}
      else if(f===_OPC.paintFormXObjectBegin){stack.push([...ctm]);if(a&&Array.isArray(a[1])&&a[1].length===6)ctm=concatCTM(ctm,a[1]);}
      else if(f===_OPC.paintFormXObjectEnd){if(stack.length>1)ctm=stack.pop();}
      else if(f===_OPC.constructPath){const{pdfToCanvas,pushSeg}=makeHelpers(ctm);decodeConstructPath(a[0],a[1],pdfToCanvas,pushSeg);}
    }
    const seen=new Set();
    pageSegments=pageSegments.filter(s=>{
      const k=Math.round(s.x1)+','+Math.round(s.y1)+','+Math.round(s.x2)+','+Math.round(s.y2);
      const r=Math.round(s.x2)+','+Math.round(s.y2)+','+Math.round(s.x1)+','+Math.round(s.y1);
      if(seen.has(k)||seen.has(r))return false;seen.add(k);return true;
    });
    snapGrid=buildSnapGrid(pageSegments);
  }catch(e){console.warn('[iOS Snap]',e);}
}
`;

const WORKER_LINE = "pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';";
const SPLASH_MARKER = '<!-- SPLASH / ACCESS GATE -->';
const AFTER_EXTRACTOR = '  } catch(e) {\n  }\n\n}\n';

// ── apply patches ──────────────────────────────────────────────────────────

function applyPatches(src) {
  let ok = 0, fail = 0;

  function tryPatch(anchor, replacement, tag, mode) {
    if (src.includes(anchor)) {
      if (mode === 'before') src = src.replace(anchor, replacement + anchor);
      else if (mode === 'after') src = src.replace(anchor, anchor + replacement);
      else src = src.replace(anchor, replacement);
      log('✓  ' + tag, 'ok'); ok++;
    } else {
      log('✗  ' + tag + ' — anchor not found', 'err'); fail++;
    }
  }

  // P1: throbber CSS
  const si = src.lastIndexOf('</style>');
  if (si >= 0) { src = src.slice(0,si) + THROBBER_CSS + src.slice(si); log('✓  Throbber CSS', 'ok'); ok++; }
  else { log('✗  Throbber CSS — </style> not found', 'err'); fail++; }

  // P2: throbber HTML
  tryPatch(SPLASH_MARKER, THROBBER_HTML, 'Throbber HTML', 'before');

  // P3: renderScale
  tryPatch('const renderScale=2.0;', IOS_DETECTION, 'renderScale → iOS-aware');

  // P4: throbber JS helpers
  tryPatch(WORKER_LINE, '\n' + THROBBER_JS, 'Throbber JS helpers', 'after');

  // P5: renderPage
  tryPatch(OLD_RENDER_PAGE, IOS_RENDER_PAGE, 'renderPage → iOS-aware');

  // P6: batched extractor
  tryPatch(AFTER_EXTRACTOR, AFTER_EXTRACTOR + BATCHED_EXTRACTOR, 'extractPageGeometryIOS');

  return { src, ok, fail };
}

// ── file handling ──────────────────────────────────────────────────────────

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;

  // Show feedback IMMEDIATELY — before any async work
  logEl.innerHTML = '';
  logEl.classList.add('show');
  dlBtn.classList.remove('show');
  dlBtn.removeAttribute('href');
  log('Reading ' + file.name + '…', 'info');

  // Use FileReader for maximum iOS compatibility
  const reader = new FileReader();

  reader.onerror = () => log('Could not read file: ' + reader.error, 'err');

  reader.onload = () => {
    try {
      const src = reader.result;
      log(Math.round(src.length / 1024) + ' KB loaded. Patching…', 'info');

      if (!src.includes('renderScale=2.0')) {
        log('⚠ File may already be patched or is not canvas.html', 'err');
      }

      const { src: patched, ok, fail } = applyPatches(src);

      log('', '');
      if (fail === 0) {
        log('All ' + ok + ' patches applied \u2713', 'ok');
      } else {
        log(ok + ' applied, ' + fail + ' failed', fail > 0 ? 'err' : 'ok');
      }

      const blob = new Blob([patched], { type: 'text/html' });
      dlBtn.href = URL.createObjectURL(blob);
      dlBtn.classList.add('show');
      log('Ready \u2014 tap Download below.', 'info');

    } catch(e) {
      log('Error: ' + e.message, 'err');
      console.error(e);
    }
  };

  reader.readAsText(file);
  fileInput.value = '';
});
</script>
</body>
</html>
